<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Favorites | MR Architecture</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS -->
  <link
    href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body class="bg-sky-50 text-gray-800">

  <!-- NAVBAR -->
  <header
    class="fixed top-0 left-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-sky-100"
  >

    <nav
      class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between"
    >

      <!-- LOGO -->
      <a
        href="/index.html"
        class="flex items-center gap-3"
      >
      
        <img
          src="/assets/images/logo.png"
          alt="MR Architecture"
          class="w-12 h-12 object-contain"
        >
      
        <div
          class="hidden sm:block"
        >
      
          <h2
            class="text-base md:text-lg font-bold tracking-wide"
          >
            MR Architecture
          </h2>
      
          <p
            class="text-[10px] md:text-xs text-gray-500"
          >
            Dream • Design • Deliver
          </p>
      
        </div>
      
      </a>

      <!-- MENU -->
      <ul
        class="hidden lg:flex items-center gap-8"
      >

        <li>
          <a
            href="index.html"
            class="hover:text-sky-500"
          >
            Home
          </a>
        </li>

        <li>
          <a
            href="plans.html"
            class="hover:text-sky-500"
          >
            Plans
          </a>
        </li>

        <li>
          <a
            href="favorites.html"
            class="text-sky-600 font-semibold"
          >
            Favorites
          </a>
        </li>

      </ul>

      <!-- RIGHT -->
      <div class="flex items-center gap-3">

      <!-- FAVORITES -->
      <a
        href="/favorites.html"
        class="relative"
      >
      
        ❤️
      
        <span
          id="favoritesCount"
          class="absolute -top-2 -right-2 bg-sky-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center"
        >
          0
        </span>
      
      </a>
      <!-- CART -->
      <a
        href="/cart.html"
        class="relative"
      >
      
        🛒
      
        <span
          id="cartCount"
          class="absolute -top-2 -right-2 bg-sky-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center"
        >
          0
        </span>
      
      </a>

      </div>

    </nav>

  </header>

  <!-- MAIN -->
  <main class="pt-24 pb-36 lg:pb-24">

    <div
      class="max-w-7xl mx-auto px-4 md:px-6"
    >

      <!-- BACK -->
      <div class="mb-6">

        <a
          href="plans.html"
          class="inline-flex items-center gap-2 text-sky-600 hover:text-sky-700"
        >
          ← Back To Plans
        </a>

      </div>

      <!-- TITLE -->
      <div class="mb-8">

        <h1
          class="text-2xl md:text-4xl font-bold"
        >
          Favorite Plans
        </h1>

        <p
          class="mt-2 text-gray-500"
        >
          Your saved house plans.
        </p>

      </div>

    <!-- GRID -->
      <div
        id="favoritesGrid"
        class="mt-8 grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-5"
      >
      </div>
    </div>

  </main>

  <!-- MOBILE NAV -->
  <div
    class="fixed bottom-0 left-0 w-full bg-white border-t border-sky-100 lg:hidden z-40"
  >

    <div class="grid grid-cols-5 h-16">

      <!-- HOME -->
      <a
        href="index.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        🏠
        <span>Home</span>
      </a>

      <!-- PLANS -->
      <a
        href="plans.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
               🔍
        <span>Plans</span>
      </a>

      <!-- FAVORITES -->
      <a
        href="favorites.html"
        class="flex flex-col items-center justify-center text-sky-600 text-[11px]"
      >
        ❤️
        <span>Favorites</span>
      </a>

      <!-- CART -->
      <a
        href="cart.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        🛒
        <span>Cart</span>
      </a>

      <!-- PROFILE -->
      <a
       href="profile.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        👤
        <span>Profile</span>
      </a>

    </div>

  </div>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- JS -->
  <script src="assets/js/app.js"></script>
  <script type="module" src="assets/js/favorites-page.js"></script>
  <script
  type="module"
  src="/assets/js/navbar.js"
></script>
</body>
</html>
