<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Profile | MR Architecture</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS -->
  <link
    href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body class="bg-sky-50 text-gray-800">

  <!-- NAVBAR -->
  <header
    class="fixed top-0 left-0 w-full right-0 z-50 bg-white/90 backdrop-blur-md border-b border-sky-100"
  >

    <nav
      class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between"
    >

      <!-- LOGO -->
      <a
        href="index.html"
        class="flex items-center gap-3"
      >
      
        <img
          src="assets/images/logo.png"
          alt="MR Architecture"
          class="w-12 h-12 object-contain"
        >
      
        <div
          class="hidden sm:block"
        >
      
          <h2
            class="text-base md:text-lg font-bold tracking-wide"
          >
            MR Architecture
          </h2>
      
          <p
            class="text-[10px] md:text-xs text-gray-500"
          >
            Dream • Design • Deliver
          </p>
      
        </div>
      
      </a>

      <!-- MENU -->
      <ul
        class="hidden lg:flex items-center gap-8"
      >

        <li>
          <a
            href="index.html"
            class="hover:text-sky-500"
          >
            Home
          </a>
        </li>

        <li>
          <a
            href="plans.html"
            class="hover:text-sky-500"
          >
            Plans
          </a>
        </li>

        <li>
          <a
            href="favorites.html"
            class="hover:text-sky-500"
          >
            Favorites
          </a>
        </li>

        <li>
          <a
            href="cart.html"
            class="hover:text-sky-500"
          >
            Cart
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main class="pt-24 pb-36 lg:pb-24">

    <div
      class="max-w-7xl mx-auto px-4 md:px-6"
    >

      <!-- TITLE -->
      <div class="mb-6 righ-0">

        <h1
          class="text-2xl md:text-4xl font-bold"
        >
          My Profile
        </h1>

        <p
          class="mt-2 text-gray-500"
        >
          Manage your account and activity.
        </p>

      </div>

<section
  class="py-10 md:py-16"
>

  <div
    class="max-w-4xl mx-auto px-4"
  >

    <!-- CARD -->
    <div
      class="bg-white rounded-[32px] shadow-sm overflow-hidden"
    >

      <!-- TOP -->
      <div
        class="p-6 md:p-10 border-b border-slate-100"
      >

        <div
          class="flex flex-col md:flex-row md:items-center gap-5"
        >

          <!-- AVATAR -->
          <div
            class="relative"
          >

            <img
              id="profileAvatar"
              src="assets/images/avatar.png"
              class="w-24 h-24 rounded-full object-cover border-4 border-sky-100"
            >

          </div>

          <!-- INFO -->
          <div>

            <h2
              id="profileName"
              class="text-2xl md:text-3xl font-bold"
            >
              Loading...
            </h2>

            <p
              id="profileEmail"
              class="mt-2 text-gray-500 text-sm"
            >
              Loading...
            </p>

            <p
              id="profilePhone"
              class="mt-1 text-gray-500 text-sm"
            >
              Loading...
            </p>

          </div>

        </div>

      </div>

      <!-- STATS -->
      <div
        class="grid grid-cols-3 border-b border-slate-100"
      >

        <a href="orders.html"
          class="p-5 text-center"
        >

          <h3
            id="ordersCount"
            class="text-2xl font-bold text-sky-500"
          >
            0
          </h3>

          <p
            class="text-sm text-gray-500"
          >
            Orders
          </p>

        </a>

        <a href="favorites.html"
          class="p-5 text-center border-x border-slate-100"
        >

          <h3
            id="favoritesCountProfile"
            class="text-2xl font-bold text-sky-500"
          >
            0
          </h3>

          <p
            class="text-sm text-gray-500"
          >
            Favorites
          </p>

        </a>

        <a href="cart.html"
          class="p-5 text-center"
        >

          <h3
            id="cartCountProfile"
            class="text-2xl font-bold text-sky-500"
          >
            0
          </h3>

          <p
            class="text-sm text-gray-500"
          >
            Cart
          </p>

        </a>

      </div>

      <!-- FORM -->
      <form
        id="profileForm"
        class="p-6 md:p-10 space-y-5"
      >

        <!-- NAME -->
        <div>

          <label
            class="block text-sm font-medium mb-2"
          >
            Full Name
          </label>

          <input
            type="text"
            id="fullName"
            class="w-full h-12 px-4 rounded-2xl border border-slate-200 outline-none text-sm"
          >

        </div>

        <!-- PHONE -->
        <div>

          <label
            class="block text-sm font-medium mb-2"
          >
            Phone Number
          </label>

          <input
            type="text"
            id="phone"
            class="w-full h-12 px-4 rounded-2xl border border-slate-200 outline-none text-sm"
          >

        </div>

        <!-- AVATAR -->
        <div>

          <label
            class="block text-sm font-medium mb-2"
          >
            Profile Photo
          </label>

          <input
            type="file"
            id="avatarInput"
            accept="image/*"
            class="w-full text-sm"
          >

        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="w-full h-12 rounded-2xl bg-sky-500 hover:bg-sky-600 text-white text-sm font-medium transition"
        >
          Save Changes
        </button>

      </form>

    </div>

  </div>

</section>

    </div>

  </main>

  <!-- MOBILE NAV -->
  <div
    class="fixed bottom-0 left-0 w-full bg-white border-t border-sky-100 lg:hidden z-40"
  >

    <div class="grid grid-cols-5 h-16">

      <!-- HOME -->
      <a
        href="index.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        🏠
        <span>Home</span>
      </a>

      <!-- PLANS -->
      <a
        href="plans.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
                🔍
        <span>Plans</span>
      </a>

      <!-- FAVORITES -->
      <a
        href="favorites.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        ❤️
        <span>Favorites</span>
      </a>

      <!-- CART -->
      <a
        href="cart.html"
        class="flex flex-col items-center justify-center text-gray-500 text-[11px]"
      >
        🛒
        <span>Cart</span>
      </a>

      <!-- PROFILE -->
      <a
        href="profile.html"
        class="flex flex-col items-center justify-center text-sky-600 text-[11px]"
      >
        👤
        <span>Profile</span>
      </a>

    </div>

  </div>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- JS -->
  <script src="assets/js/app.js"></script>
  <script type="module" src="assets/js/profile.js"></script>
</body>
</html>
