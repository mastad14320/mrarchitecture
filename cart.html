<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Cart | MR Architecture</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body class="bg-sky-50 text-gray-800">

  <!-- PAGE -->
  <section class="py-6 md:py-10">

    <div class="max-w-7xl mx-auto px-4">

      <!-- BACK -->
      <a
        href="plans.html"
        class="inline-flex items-center gap-2 text-sky-600 hover:text-sky-700 text-sm"
      >
        ← Back To Plans
      </a>

      <!-- TITLE -->
      <h1
        class="mt-4 text-2xl md:text-4xl font-bold"
      >
        My Cart
      </h1>

      <!-- CONTENT -->
      <div
        class="mt-8 grid lg:grid-cols-[1fr_350px] gap-6"
      >

        <!-- ITEMS -->
        <div
          id="cartItems"
          class="space-y-5"
        >
        </div>

        <!-- SUMMARY -->
        <div
          class="bg-white rounded-[28px] p-6 shadow-sm h-fit sticky top-24"
        >

          <h2
            class="text-xl font-bold"
          >
            Summary
          </h2>

          <div
            class="mt-6 flex items-center justify-between"
          >

            <span>Total</span>

            <span
              id="cartTotal"
              class="font-bold text-sky-600 text-xl"
            >
              UGX 0
            </span>

          </div>

          <!-- BUTTON -->
          <a
            href="checkout.html"
            class="mt-6 w-full bg-sky-500 hover:bg-sky-600 text-white h-12 rounded-2xl transition flex items-center justify-center"
          >
            Proceed To Checkout
          </a>

        </div>

      </div>

    </div>

  </section>

  <!-- SCRIPT -->
  <script type="module" src="assets/js/cart-page.js"></script>

</body>

</html>
