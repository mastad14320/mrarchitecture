<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login | MR Architecture</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body class="bg-sky-50 text-gray-800 min-h-screen">

  <!-- CONTAINER -->
  <div
    class="min-h-screen grid lg:grid-cols-2"
  >

    <!-- LEFT -->
    <div
      class="hidden lg:flex bg-sky-500 items-center justify-center p-10"
    >

      <div class="max-w-md text-white">

        <h1
          class="text-5xl font-bold leading-tight"
        >
          Welcome Back
        </h1>

        <p
          class="mt-6 text-sky-100 leading-relaxed"
        >
          Login to continue exploring premium architectural house plans
          designed for modern living.
        </p>

      </div>

    </div>

    <!-- RIGHT -->
    <div
      class="flex items-center justify-center p-5 md:p-10"
    >

      <!-- CARD -->
      <div
        class="w-full max-w-md bg-white rounded-[32px] p-6 md:p-8 shadow-sm"
      >

        <!-- LOGO -->
        <a
          href="index.html"
          class="text-2xl font-bold text-sky-600"
        >
          MR Architecture
        </a>

        <!-- TITLE -->
        <div class="mt-8">

          <h2
            class="text-2xl md:text-3xl font-bold"
          >
            Login
          </h2>

          <p
            class="mt-2 text-gray-500"
          >
            Access your account.
          </p>

        </div>

        <!-- FORM -->
        <form id="loginForm" class="mt-8 space-y-5">

          <!-- EMAIL -->
          <div>

            <label
              class="block mb-2 text-[12px] text-gray-500"
            >
              Email Address
            </label>

            <input
              id="loginEmail"
              type="email"
              placeholder="Enter your email"
              class="w-full h-12 px-4 rounded-2xl border border-sky-100 focus:outline-none focus:border-sky-500"
            >

          </div>

          <!-- PASSWORD -->
          <div>

            <label
              class="block mb-2 text-[12px] text-gray-500"
            >
              Password
            </label>

            <input
              id="loginPassword"
              type="password"
              placeholder="Enter your password"
              class="w-full h-12 px-4 rounded-2xl border border-sky-100 focus:outline-none focus:border-sky-500"
            >

          </div>

          <!-- FORGOT -->
          <div class="text-right">

            <a
              href="#"
              class="text-sky-600 text-[12px]"
            >
              Forgot Password?
            </a>

          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="w-full bg-sky-500 hover:bg-sky-600 text-white h-12 rounded-2xl transition"
          >
            Login
          </button>

        </form>

        <!-- REGISTER -->
        <p
          class="mt-6 text-center text-gray-500 text-[13px]"
        >

          Don't have an account?

          <a
            href="register.html"
            class="text-sky-600 font-medium"
          >
            Register
          </a>

        </p>

      </div>

    </div>

  </div>
<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
