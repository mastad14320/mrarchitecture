<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Checkout | MR Architecture</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body class="bg-sky-50 text-gray-800">

  <!-- PAGE -->
  <section class="py-6 md:py-10">

    <div class="max-w-7xl mx-auto px-4">

      <!-- BACK -->
      <a
        href="cart.html"
        class="inline-flex items-center gap-2 text-sky-600 hover:text-sky-700 text-sm"
      >
        ← Back To Cart
      </a>

      <!-- TITLE -->
      <h1
        class="mt-4 text-2xl md:text-4xl font-bold"
      >
        Checkout
      </h1>

      <!-- LAYOUT -->
      <div
        class="mt-8 grid lg:grid-cols-[1fr_380px] gap-6"
      >

        <!-- LEFT -->
        <div class="space-y-6">

          <!-- PAYMENT METHODS -->
          <div
            class="bg-white rounded-[28px] p-5 md:p-6 shadow-sm"
          >

            <h2
              class="text-xl font-bold"
            >
              Payment Methods
            </h2>

            <!-- METHODS -->
            <div
              class="mt-6 grid sm:grid-cols-2 gap-4"
            >

              <!-- MTN -->
              <div
                class="border border-yellow-200 bg-yellow-50 rounded-2xl p-5"
              >

                <div
                  class="flex items-center justify-between"
                >

                  <h3
                    class="font-bold text-lg"
                  >
                    MTN MoMo
                  </h3>

                  <span class="text-2xl">
                    📱
                  </span>

                </div>

                <div class="mt-4">

                  <p
                    class="text-sm text-gray-600"
                  >
                    Send payment to:
                  </p>

                  <h2
                    class="mt-1 text-xl font-bold"
                  >
                    0769370218
                  </h2>

                  <p
                    class="mt-2 text-sm text-gray-500"
                  >
                    MR Architecture
                  </p>

                </div>

              </div>

              <!-- AIRTEL -->
              <div
                class="border border-red-200 bg-red-50 rounded-2xl p-5"
              >

                <div
                  class="flex items-center justify-between"
                >

                  <h3
                    class="font-bold text-lg"
                  >
                    Airtel Money
                  </h3>

                  <span class="text-2xl">
                    💳
                  </span>

                </div>

                <div class="mt-4">

                  <p
                    class="text-sm text-gray-600"
                  >
                    Send payment to:
                  </p>

                  <h2
                    class="mt-1 text-xl font-bold"
                  >
                    0769370218
                  </h2>

                  <p
                    class="mt-2 text-sm text-gray-500"
                  >
                    MR Architecture
                  </p>

                </div>

              </div>

            </div>

          </div>

          <!-- CONFIRMATION -->
          <div
            class="bg-white rounded-[28px] p-5 md:p-6 shadow-sm"
          >

            <h2
              class="text-xl font-bold"
            >
              Payment Confirmation
            </h2>

            <!-- FORM -->
            <div class="mt-6 space-y-4">

              <!-- NAME -->
              <div>

                <label
                  class="text-sm font-medium"
                >
                  Full Name
                </label>

                <input
                  type="text"
                  id="customerName"
                  placeholder="Enter your name"
                  class="mt-2 w-full h-12 px-4 rounded-2xl border border-sky-100 outline-none focus:border-sky-500"
                />

              </div>

              <!-- PHONE -->
              <div>

                <label
                  class="text-sm font-medium"
                >
                  Phone Number
                </label>

                <input
                  type="text"
                  id="customerPhone"
                  placeholder="Enter phone number"
                  class="mt-2 w-full h-12 px-4 rounded-2xl border border-sky-100 outline-none focus:border-sky-500"
                />

              </div>

              <!-- TRANSACTION -->
              <div>

                <label
                  class="text-sm font-medium"
                >
                  Transaction ID
                </label>

                <input
                  type="text"
                  id="transactionId"
                  placeholder="Enter transaction ID"
                  class="mt-2 w-full h-12 px-4 rounded-2xl border border-sky-100 outline-none focus:border-sky-500"
                />

              </div>

              <!-- PAYMENT PROOF -->
              <div class="mt-5">
              
                <label
                  class="text-sm font-medium"
                >
                  Payment Screenshot (Optional)
                </label>
              
                <input
                  type="file"
                  id="paymentProof"
                  accept="image/*"
                  class="mt-2 block w-full text-sm"
                />
              
                <p
                  class="mt-2 text-[11px] text-gray-500"
                >
                  Upload MTN/Airtel payment screenshot
                </p>
              
              </div>
              
              <!-- PREVIEW -->
              <div
                id="paymentPreview"
                class="mt-4 hidden"
              >
              
                <img
                  id="paymentPreviewImage"
                  class="w-32 h-32 object-cover rounded-2xl border border-sky-100"
                />
              
              </div>

              <!-- BUTTON -->
              <button
                id="placeOrderBtn"
                class="w-full bg-sky-500 hover:bg-sky-600 text-white h-12 rounded-2xl transition"
              >
                Place Order
              </button>
            </div>

          </div>

        </div>

        <!-- RIGHT -->
        <div>

          <!-- SUMMARY -->
          <div
            class="bg-white rounded-[28px] p-6 shadow-sm sticky top-24"
          >

            <h2
              class="text-xl font-bold"
            >
              Order Summary
            </h2>

            <!-- ITEMS -->
            <div
              id="checkoutItems"
              class="mt-6 space-y-4"
            >
            </div>

            <!-- TOTAL -->
            <div
              class="mt-6 pt-6 border-t border-sky-100 flex items-center justify-between"
            >

              <span
                class="font-semibold"
              >
                Total
              </span>

              <span
                id="checkoutTotal"
                class="font-bold text-sky-600 text-xl"
              >
                UGX 0
              </span>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- SCRIPT -->
  <script
    type="module"
    src="assets/js/checkout.js"
  ></script>

</body>

</html>
